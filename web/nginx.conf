server {
    listen 80;

    # Serve the React SPA
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy gRPC gateway endpoints to Kong via k8s service DNS
    location /hello {
        proxy_pass http://kong-gateway-proxy.kong/hello;
        proxy_set_header Content-Type application/json;
    }

    location /goodbye {
        proxy_pass http://kong-gateway-proxy.kong/goodbye;
        proxy_set_header Content-Type application/json;
    }
}
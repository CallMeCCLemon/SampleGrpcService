server {
    listen 80;

    # Forward /greeter/* to Kong, preserving the full path. Kong runs with
    # strip-path: "false" and matches /greeter/api/... against the proto
    # HTTP annotations. The /greeter prefix keeps API routes namespaced so
    # client-side React Router paths (/about, /profile, etc.) never collide
    # with the Kong proxy.
    location /greeter/ {
        proxy_pass http://kong-gateway-proxy.kong;
        proxy_set_header Content-Type application/json;
    }

    # Serve the React SPA — try the exact file, then directory, then fall back
    # to index.html so React Router can handle the route client-side.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

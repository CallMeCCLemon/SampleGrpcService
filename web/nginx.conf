server {
    listen 80;

    # Proxy all /api/* requests to Kong, stripping the /api prefix.
    # e.g. POST /api/hello -> Kong receives POST /hello
    # This keeps API routes namespaced so React Router client-side routes
    # (/about, /profile, etc.) never conflict with the Kong proxy.
    location /api/ {
        proxy_pass http://kong-gateway-proxy.kong/;
        proxy_set_header Content-Type application/json;
    }

    # Serve the React SPA — try the exact file, then directory, then fall back
    # to index.html so React Router can handle the route client-side.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

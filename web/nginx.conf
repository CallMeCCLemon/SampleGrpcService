server {
    listen 80;

    # Proxy any path that starts with a lowercase letter and has no file extension
    # to Kong's gRPC gateway. This covers all proto-defined HTTP endpoints
    # (e.g. /hello, /goodbye, /any-future-route) without needing to enumerate them.
    #
    # Paths with dots (/assets/main.js, /favicon.svg) and the root (/) fall
    # through to the SPA location block below.
    #
    # Note: if you add React Router client-side routes (e.g. /about, /profile),
    # those will also match this regex and be proxied to Kong. In that case,
    # switch to an explicit API prefix (e.g. /api/) to distinguish them.
    location ~ ^/[a-z][^.]*$ {
        proxy_pass http://kong-gateway-proxy.kong;
        proxy_set_header Content-Type application/json;
    }

    # Serve the React SPA — try the exact file, then directory, then fall back
    # to index.html so React Router can handle the route client-side.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

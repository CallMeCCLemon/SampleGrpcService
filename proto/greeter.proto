syntax = "proto3";

package greeter;

import "google/api/annotations.proto";

option go_package = "SampleGrpcProject/pb";

service Greeter {
  rpc Echo (EchoRequest) returns (EchoReply) {
    option (google.api.http) = {
      post: "/echo"
      body: "*"
    };
  }
}

message EchoRequest {
  string message = 1;
}

message EchoReply {
  string message = 1;
}

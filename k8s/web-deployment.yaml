---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: greeter-web
  namespace: grpc-demo
  labels:
    app: greeter-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: greeter-web
  template:
    metadata:
      labels:
        app: greeter-web
    spec:
      containers:
        - name: greeter-web
          image: 192.168.1.110:32000/sample-grpc-web:0.2.2-e37868e
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: greeter-web
  namespace: grpc-demo
  labels:
    app: greeter-web
spec:
  type: NodePort
  selector:
    app: greeter-web
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30090
      protocol: TCP

---
# Tells Kong to use the grpc-gateway plugin on routes that match the Ingress
# below, transcoding HTTP/JSON ↔ gRPC using the mounted proto definition.
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: grpc-gateway
  namespace: grpc-demo
plugin: grpc-gateway
config:
  proto: /etc/kong/protos/greeter.proto

---
# Routes inbound HTTP traffic from Kong's proxy to the gRPC service.
# Kong transcodes each request using the grpc-gateway plugin.
#
# Endpoints exposed to the web app (defined by google.api.http annotations in the proto):
#   POST http://<node-ip>:30080/api/echo  {"message":"hello world"}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: greeter-http
  namespace: grpc-demo
  annotations:
    konghq.com/plugins: grpc-gateway
    # Tell Kong this Ingress accepts plain HTTP from clients (the plugin handles
    # the gRPC conversion upstream; see konghq.com/protocol on the Service).
    konghq.com/protocols: http
    # Strip the api_prefix before forwarding to the gRPC service so that backend
    # route annotations in the proto (/echo) don't need to include the prefix.
    konghq.com/strip-path: "true"
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: greeter
                port:
                  number: 50051

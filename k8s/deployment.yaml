---
apiVersion: v1
kind: Namespace
metadata:
  name: grpc-demo

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: greeter
  namespace: grpc-demo
  labels:
    app: greeter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: greeter
  template:
    metadata:
      labels:
        app: greeter
    spec:
      containers:
        - name: greeter
          image: 192.168.1.110:32000/sample-grpc:latest
          imagePullPolicy: Always
          env:
            # CNPG creates this secret automatically when the Cluster is ready.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: greeter-db-app
                  key: uri
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 3
            periodSeconds: 10

---
# NodePort exposes the service on every node at a static port (30051 here),
# making it reachable from anywhere on your home network without a load balancer.
# If you have MetalLB installed, change type to LoadBalancer and remove nodePort.
apiVersion: v1
kind: Service
metadata:
  name: greeter
  namespace: grpc-demo
  labels:
    app: greeter
  annotations:
    # Tells Kong Ingress Controller to connect to this service using gRPC (h2c)
    # rather than plain HTTP, enabling the grpc-gateway plugin to transcode.
    konghq.com/protocol: grpc
spec:
  type: NodePort
  selector:
    app: greeter
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      nodePort: 30051
      protocol: TCP

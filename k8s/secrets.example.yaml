---
# Cloudflare tunnel credentials for cloudflared.
#
# 1. Create a tunnel in the Cloudflare Zero Trust dashboard.
# 2. Copy the tunnel token from the "Install connector" step.
# 3. Copy this file to k8s/secrets.yaml, paste your token, and apply:
#
#    cp k8s/secrets.example.yaml k8s/secrets.yaml
#    # edit k8s/secrets.yaml — replace <your-tunnel-token>
#    kubectl apply -f k8s/secrets.yaml
#
# secrets.yaml is gitignored — never commit the real token.
apiVersion: v1
kind: Secret
stringData:
  token: <your-cloudflare-tunnel-token>
metadata:
  name: sample-grpc-demo-tunnel-creds
  namespace: grpc-demo
type: Opaque

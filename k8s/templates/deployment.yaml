# Edit project.yaml and run 'make generate-k8s' to regenerate. Do not edit by hand.
---
apiVersion: v1
kind: Namespace
metadata:
  name: ${NAMESPACE}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${PROJECT_NAME}
  namespace: ${NAMESPACE}
  labels:
    app: ${PROJECT_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${PROJECT_NAME}
  template:
    metadata:
      labels:
        app: ${PROJECT_NAME}
    spec:
      containers:
        - name: ${PROJECT_NAME}
          image: ${IMAGE}:latest
          imagePullPolicy: Always
          env:
            # CNPG creates this secret automatically when the Cluster is ready.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ${PROJECT_NAME}-db-app
                  key: uri
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 3
            periodSeconds: 10

---
# NodePort exposes the service on every node at a static port,
# making it reachable from anywhere on your home network without a load balancer.
# If you have MetalLB installed, change type to LoadBalancer and remove nodePort.
apiVersion: v1
kind: Service
metadata:
  name: ${PROJECT_NAME}
  namespace: ${NAMESPACE}
  labels:
    app: ${PROJECT_NAME}
  annotations:
    # Tells Kong Ingress Controller to connect to this service using gRPC (h2c)
    # rather than plain HTTP, enabling the grpc-gateway plugin to transcode.
    konghq.com/protocol: grpc
spec:
  type: NodePort
  selector:
    app: ${PROJECT_NAME}
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      nodePort: ${GRPC_NODEPORT}
      protocol: TCP

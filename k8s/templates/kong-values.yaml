# Auto-generated from k8s/templates/kong-values.yaml
# Edit project.yaml and run 'make generate-k8s' to regenerate. Do not edit by hand.
#
# Helm values for kong/ingress (Kong Ingress Controller)
# Install: helm upgrade --install kong kong/ingress --namespace kong --values k8s/kong-values.yaml

gateway:
  proxy:
    type: NodePort
    http:
      nodePort: ${KONG_NODEPORT}
    # HTTPS disabled for now — Cloudflare tunnel handles TLS termination.
    tls:
      enabled: false

  # Mount the service proto file into the Kong gateway pod so the
  # grpc-gateway plugin can use it for HTTP/JSON ↔ gRPC transcoding.
  deployment:
    userDefinedVolumes:
      - name: grpc-protos
        configMap:
          name: ${PROJECT_NAME}-proto
      - name: googleapis-protos
        configMap:
          name: googleapis-protos
    userDefinedVolumeMounts:
      - name: grpc-protos
        mountPath: /etc/kong/protos
        readOnly: true
      - name: googleapis-protos
        mountPath: /etc/kong/protos/google/api
        readOnly: true
